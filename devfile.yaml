dschemaVersion: 2.2.2
metadata:
  name: pacman
attributes:
  .vscode/settings.json: |
    {
      "remote.portsAttributes": {
        "13131-13133": {
          "onAutoForward": "ignore"
        }
      }
    }
projects:
  - name: pacman
    git:
      remotes:
        origin: 'https://github.com/rh-markus/pacman.git'
      checkoutFrom: 
        revision: main
components:
  - name: tools
    container:
      image: registry.redhat.io/devspaces/udi-rhel8@sha256:d147892c643a0127cfcf868daee0ff416a8df922fe2a7c716ebfc457ff526fa2
      endpoints:
        - exposure: public
          name: nodejs
          protocol: https
          targetPort: 8080
        - name: code-redirect-1
          targetPort: 13131
          exposure: none
          protocol: https
          attributes:
            discoverable: false
            urlRewriteSupported: false
        - name: code-redirect-2
          targetPort: 13132
          exposure: none
          protocol: https
          attributes:
            discoverable: false
            urlRewriteSupported: false
        - name: code-redirect-3
          targetPort: 13133
          exposure: none
          protocol: https
          attributes:
            discoverable: false
            urlRewriteSupported: false
      memoryLimit: 1Gi
      memoryRequest: 600Mi
      cpuLimit: '0.5'
      cpuRequest: '0.25'
      mountSources: true
    
commands:
  - id: 1-dependencies
    exec:
      label: Download dependencies
      component: tools
      workingDir: ${PROJECTS_ROOT}/pacman/src
      commandLine: npm install
      group:
        kind: build
  - id: 2-run
    exec:
      label: Run the web app
      component: tools
      workingDir: ${PROJECTS_ROOT}/pacman/src
      commandLine: npm start
      group:
        kind: run
  - id: 3-install-and-run
    exec:
      label: Run the web app (and download dependencies)
      component: tools
      workingDir: ${PROJECTS_ROOT}/pacman/src
      commandLine: npm install; npm start
      group:
        kind: run
